spring:
  datasource:
    # 문제 해결:
    # loadtest 프로필이 기본 개발 DB(`effectivedisco`)를 그대로 쓰면
    # k6가 만든 게시물/댓글이 개발 환경 데이터에 누적돼 측정 기준선이 계속 변한다.
    # loadtest는 별도 DB를 기본값으로 사용해 실험 데이터를 애초에 분리한다.
    url: jdbc:postgresql://localhost:5432/${APP_LOAD_TEST_DB_NAME:effectivedisco_loadtest}
    username: ${APP_LOAD_TEST_DB_USERNAME:postgres}
    password: ${APP_LOAD_TEST_DB_PASSWORD:4321}
    driver-class-name: ${APP_LOAD_TEST_DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
    hikari:
      data-source-properties:
        # 문제 해결:
        # PostgreSQL wait/slow-query 계측은 loadtest 인스턴스가 만든 커넥션만 골라봐야 의미가 있다.
        # application_name 을 고정해 pg_stat_activity 에서 기본 앱과 실험용 앱을 구분한다.
        ApplicationName: ${APP_LOAD_TEST_PG_APPLICATION_NAME:effective-disco-loadtest}
      # 2026-04-13 OSIV 비활성화 + notification lock 제거 후 재조정.
      # OSIV off 로 connection hold time 이 서비스 트랜잭션 범위로 줄었고,
      # lock 제거로 같은 pool 에서 더 많은 요청을 소화할 수 있다.
      # pool 28 유지, connection-timeout 을 2초로 올려 burst 흡수 여유를 확보.
      maximum-pool-size: ${APP_LOAD_TEST_DB_POOL_MAX_SIZE:28}
      minimum-idle: ${APP_LOAD_TEST_DB_POOL_MIN_IDLE:10}
      connection-timeout: ${APP_LOAD_TEST_DB_POOL_CONNECTION_TIMEOUT_MS:2000}
      # leak-detection: 5초 이상 반환되지 않는 connection 로그 경고
      leak-detection-threshold: ${APP_LOAD_TEST_DB_POOL_LEAK_DETECTION_MS:5000}
  jpa:
    show-sql: false
    properties:
      # 문제 해결:
      # loadtest 전용 병목 분석에서는 Hibernate 통계를 켜야 statement/query 누적치를 읽을 수 있다.
      # 운영 기본 프로필에는 비용을 전파하지 않도록 loadtest 에서만 활성화한다.
      hibernate.generate_statistics: true

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

app:
  load-test:
    # 문제 해결:
    # 부하 테스트용 내부 진단 endpoint와 샘플러는 운영 기본 프로필에서 열리면 안 된다.
    # loadtest 프로필에서만 켜서 k6 계측에 필요한 최소 관측면만 노출한다.
    enabled: true
    sampling-interval-ms: ${APP_LOAD_TEST_SAMPLING_INTERVAL_MS:250}
    datasource:
      # 문제 해결:
      # loadtest가 전용 DB가 아닌 다른 PostgreSQL DB를 가리키면
      # cleanup이 있어도 개발 데이터와 측정 데이터가 섞여 결과 해석이 흔들린다.
      # 지정한 DB 이름이 아니면 loadtest 프로필 기동 자체를 막아 실수를 조기에 차단한다.
      enforce-isolation: ${APP_LOAD_TEST_ENFORCE_ISOLATION:true}
      required-db-name: ${APP_LOAD_TEST_DB_NAME:effectivedisco_loadtest}
    postgres:
      application-name: ${APP_LOAD_TEST_PG_APPLICATION_NAME:effective-disco-loadtest}
      long-running-transaction-threshold-ms: ${APP_LOAD_TEST_PG_LONG_TRANSACTION_THRESHOLD_MS:500}
      long-running-query-threshold-ms: ${APP_LOAD_TEST_PG_LONG_QUERY_THRESHOLD_MS:500}
      wait-event-limit: ${APP_LOAD_TEST_PG_WAIT_EVENT_LIMIT:5}
      slow-query-limit: ${APP_LOAD_TEST_PG_SLOW_QUERY_LIMIT:5}
