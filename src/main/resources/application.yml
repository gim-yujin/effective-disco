spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/effectivedisco
    username: postgres
    password: 4321
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

jwt:
  secret: effective-disco-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24 hours in milliseconds

server:
  port: 8080

app:
  upload-dir: uploads/images

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
