spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/effectivedisco
    username: postgres
    password: 4321
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  # 이메일 발송 설정 (환경 변수로 오버라이드: MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD)
  # spring.mail.host 가 비어있으면 Spring Boot 가 JavaMailSender 빈을 생성하지 않으므로
  # 개발 환경에서 SMTP 설정 없이도 기동 가능하다. 이 경우 재설정 링크를 콘솔 로그로 확인한다.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: effective-disco-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24 hours in milliseconds

server:
  port: 8080

app:
  upload-dir: uploads/images
  # 댓글 최대 깊이 (0 = 최상위만, 1 = 대댓글 1단계, 2 = 2단계 ... 기본값 2)
  comment:
    max-depth: ${APP_COMMENT_MAX_DEPTH:2}
  # 비밀번호 재설정 링크에 사용할 베이스 URL (환경 변수 APP_BASE_URL로 오버라이드 가능)
  base-url: ${APP_BASE_URL:http://localhost:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
