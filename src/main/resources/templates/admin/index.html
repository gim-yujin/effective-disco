<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>관리자 패널 — BBS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <div class="container">

        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <span>관리자 패널</span>
        </div>

        <!-- ── 게시판 관리 ──────────────────────────────────── -->
        <div class="admin-section">
            <h2>게시판 관리</h2>

            <!-- 게시판 신규 생성 폼 -->
            <form th:action="@{/admin/boards}" method="post" class="admin-form-row">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="text" name="name"        placeholder="이름"   required maxlength="50">
                <input type="text" name="slug"        placeholder="슬러그" required maxlength="30"
                       pattern="^[a-z0-9-]+$" title="소문자·숫자·하이픈만 사용 가능">
                <input type="text" name="description" placeholder="설명 (선택)" maxlength="200">
                <button class="btn btn-primary" type="submit">[게시판 추가]</button>
            </form>

            <!-- 기존 게시판 목록 -->
            <table class="board-table">
                <thead>
                    <tr>
                        <th class="board-name-cell">이름</th>
                        <th>슬러그</th>
                        <th class="col-board-desc">설명</th>
                        <th class="col-board-count">게시물</th>
                        <th style="width:220px;">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(boards)}">
                        <td colspan="5" class="empty">게시판이 없습니다.</td>
                    </tr>
                    <tr th:each="b : ${boards}">
                        <td class="board-name-cell" th:text="${b.name}">이름</td>
                        <td th:text="${b.slug}">slug</td>
                        <td class="col-board-desc" th:text="${b.description}">설명</td>
                        <td class="col-board-count" th:text="${b.postCount}">0</td>
                        <td>
                            <!-- 이름·설명 수정 폼 (슬러그는 변경 불가) -->
                            <form th:action="@{/admin/boards/{s}/update(s=${b.slug})}" method="post"
                                  style="display:inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="slug"        th:value="${b.slug}">
                                <input type="text"   name="name"        th:value="${b.name}"
                                       style="width:80px;padding:2px 4px;font-size:12px;">
                                <input type="text"   name="description" th:value="${b.description}"
                                       style="width:120px;padding:2px 4px;font-size:12px;">
                                <button class="btn btn-sm" type="submit">[수정]</button>
                            </form>
                            <!-- 게시판 삭제 (게시물은 미분류로 보존) -->
                            <form th:action="@{/admin/boards/{s}/delete(s=${b.slug})}" method="post"
                                  style="display:inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-danger" type="submit"
                                        onclick="return confirm('삭제하면 이 게시판의 게시물이 미분류로 이동합니다. 계속하시겠습니까?')">[삭제]</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- ── 사용자 관리 ──────────────────────────────────── -->
        <div class="admin-section">
            <h2>사용자 관리</h2>
            <table class="board-table">
                <thead>
                    <tr>
                        <th class="col-no">#</th>
                        <th>사용자명</th>
                        <th>이메일</th>
                        <th class="col-date">가입일</th>
                        <th style="width:80px;text-align:center;">권한</th>
                        <th style="width:80px;">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u, stat : ${users}">
                        <td class="col-no" th:text="${stat.count}">1</td>
                        <td>
                            <a class="author-link"
                               th:href="@{/users/{u}(u=${u.username})}"
                               th:text="${u.username}">username</a>
                        </td>
                        <td th:text="${u.email}">email</td>
                        <td class="col-date"
                            th:text="${#temporals.format(u.createdAt, 'yy/MM/dd')}">날짜</td>
                        <td style="text-align:center;">
                            <span class="role-badge"
                                  th:classappend="${u.role == 'ROLE_ADMIN'} ? ' admin' : ' user'"
                                  th:text="${u.role == 'ROLE_ADMIN'} ? 'ADMIN' : 'USER'">USER</span>
                        </td>
                        <td>
                            <!-- 자기 자신은 권한 변경 불가 -->
                            <form th:action="@{/admin/users/{id}/toggle-role(id=${u.id})}"
                                  method="post" style="display:inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="currentUsername" sec:authentication="name">
                                <button class="btn btn-sm" type="submit"
                                        th:disabled="${u.username == #authentication.name}"
                                        th:text="${u.role == 'ROLE_ADMIN'} ? '[강등]' : '[승격]'">
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</main>
</body>
</html>
