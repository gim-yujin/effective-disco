<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 찾기 — BBS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <div class="container">
        <div class="form-box auth-box">
            <h2>비밀번호 찾기</h2>

            <!-- 발송 성공 안내 (리다이렉트 후 flash attribute) -->
            <div class="alert alert-success" th:if="${msg}" th:text="${msg}"></div>

            <p style="margin-bottom:16px; color:#555; font-size:14px;">
                가입 시 사용한 이메일 주소를 입력하시면<br>
                비밀번호 재설정 링크를 보내드립니다.
            </p>

            <form th:action="@{/forgot-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" required autofocus
                           placeholder="example@email.com">
                </div>
                <button class="btn btn-primary" type="submit">[재설정 링크 발송]</button>
            </form>

            <p class="auth-note">
                <a th:href="@{/login}">로그인으로 돌아가기</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
