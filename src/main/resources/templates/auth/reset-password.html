<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정 — BBS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <div class="container">
        <div class="form-box auth-box">
            <h2>비밀번호 재설정</h2>

            <!-- 토큰 오류 또는 비밀번호 불일치 오류 -->
            <div class="alert" th:if="${errorMsg}" th:text="${errorMsg}"></div>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <!-- 재설정 토큰을 hidden 필드로 전달 -->
                <input type="hidden" name="token" th:value="${token}">

                <div class="form-group">
                    <label for="newPassword">새 비밀번호</label>
                    <input type="password" id="newPassword" name="newPassword"
                           required minlength="6" autofocus placeholder="6자 이상">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">새 비밀번호 확인</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           required placeholder="비밀번호를 한 번 더 입력">
                </div>

                <button class="btn btn-primary" type="submit">[비밀번호 변경]</button>
            </form>

            <p class="auth-note">
                <a th:href="@{/forgot-password}">재설정 링크 재발송</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
