<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 — BBS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <div class="container">
        <div class="form-box auth-box">
            <h2>회원가입</h2>

            <div class="alert" th:if="${error}" th:text="${error}">오류</div>

            <form th:action="@{/signup}" th:object="${signupRequest}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="username">아이디 (3~20자)</label>
                    <input type="text" id="username" th:field="*{username}"
                           minlength="3" maxlength="20" required autofocus>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" th:field="*{email}" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호 (6자 이상)</label>
                    <input type="password" id="password" th:field="*{password}" minlength="6" required>
                </div>
                <button class="btn btn-primary" type="submit">[가입하기]</button>
            </form>

            <p class="auth-note">
                이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
