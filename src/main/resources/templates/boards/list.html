<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${board.name} + ' — BBS'">게시판</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <div class="container">

        <!-- 빵 부스러기(breadcrumb): 홈 > 게시판이름 -->
        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <span th:text="${board.name}">게시판이름</span>
        </div>

        <div class="toolbar">
            <!-- 태그 필터 활성화 중일 때 -->
            <h2 th:if="${tag != null and !tag.isBlank()}">
                <span th:text="${board.name}"></span>
                &mdash; #<span th:text="${tag}"></span> 태그
                &mdash; <span th:text="${posts.totalElements}">0</span>건
            </h2>
            <!-- 키워드 검색 중일 때 -->
            <h2 th:if="${(tag == null or tag.isBlank()) and !(keyword == null or keyword.isBlank())}">
                <span th:text="${board.name}"></span>
                &mdash; &ldquo;<span th:text="${keyword}"></span>&rdquo; 검색결과
                &mdash; <span th:text="${posts.totalElements}">0</span>건
            </h2>
            <!-- 기본 전체 목록 -->
            <h2 th:if="${(tag == null or tag.isBlank()) and (keyword == null or keyword.isBlank())}">
                <span th:text="${board.name}"></span>
                &mdash; 전체 <span th:text="${posts.totalElements}">0</span>개
            </h2>
            <!-- 글쓰기 버튼: 로그인한 사용자에게만 표시 -->
            <sec:authorize access="isAuthenticated()">
                <a class="btn btn-primary"
                   th:href="@{/boards/{slug}/posts/new(slug=${board.slug})}">[글쓰기]</a>
            </sec:authorize>
        </div>

        <!-- 태그 필터 바 -->
        <div class="tag-filter-bar" th:if="${!#lists.isEmpty(allTags)}">
            <span class="tag-filter-label">태그:</span>
            <!-- "전체" 버튼: 태그 필터 해제 -->
            <a class="tag"
               th:classappend="${tag == null or tag.isBlank()} ? ' active' : ''"
               th:href="@{/boards/{slug}(slug=${board.slug})}">전체</a>
            <!-- 개별 태그 필터 링크 -->
            <a th:each="t : ${allTags}" class="tag"
               th:classappend="${t == tag} ? ' active' : ''"
               th:href="@{/boards/{slug}(slug=${board.slug}, tag=${t})}"
               th:text="'#' + ${t}">태그</a>
        </div>

        <!-- 정렬 선택 바: 태그/키워드 필터 중에는 비활성화 (최신순 고정) -->
        <div class="sort-bar" th:if="${(tag == null or tag.isBlank()) and (keyword == null or keyword.isBlank())}">
            <span class="sort-label">정렬:</span>
            <a th:classappend="${sort == 'latest'} ? ' active' : ''"
               th:href="@{/boards/{slug}(slug=${board.slug}, sort='latest')}">최신순</a>
            <a th:classappend="${sort == 'likes'} ? ' active' : ''"
               th:href="@{/boards/{slug}(slug=${board.slug}, sort='likes')}">인기순 ♥</a>
            <a th:classappend="${sort == 'comments'} ? ' active' : ''"
               th:href="@{/boards/{slug}(slug=${board.slug}, sort='comments')}">댓글순 💬</a>
        </div>

        <!-- 키워드 검색 폼 -->
        <form class="search-form"
              th:action="@{/boards/{slug}(slug=${board.slug})}" method="get">
            <input type="text" name="keyword" class="search-input"
                   placeholder="제목 / 내용 / 작성자 검색"
                   th:value="${keyword}">
            <button type="submit" class="btn btn-search">검색</button>
            <!-- 검색 중일 때만 "전체보기" 링크 표시 -->
            <a th:if="${keyword != null and !keyword.isBlank()}"
               th:href="@{/boards/{slug}(slug=${board.slug})}"
               class="btn btn-reset">전체보기</a>
        </form>

        <!-- 고정 게시물 (공지사항) -->
        <div th:if="${!#lists.isEmpty(pinnedPosts)}" class="pinned-section">
            <table class="board-table">
                <tbody>
                    <tr th:each="pin : ${pinnedPosts}" class="pinned-row">
                        <td class="col-no" style="width:36px;">📌</td>
                        <td>
                            <a class="title-link"
                               th:href="@{/posts/{id}(id=${pin.id})}"
                               th:text="${pin.title}">제목</a>
                        </td>
                        <td class="col-author" th:text="${pin.author}">작성자</td>
                        <td class="col-date"
                            th:text="${#temporals.format(pin.createdAt, 'yy/MM/dd')}">날짜</td>
                        <td class="col-views"    th:text="${pin.viewCount}">0</td>
                        <td class="col-comments" th:text="${pin.commentCount}">0</td>
                        <td class="col-likes"    th:text="${pin.likeCount}">0</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 게시물 목록 테이블: data-* 속성으로 무한 스크롤 JS에 초기값 전달 -->
        <table class="board-table" id="post-table"
               th:data-board-slug="${board.slug}"
               th:data-total-pages="${posts.totalPages}"
               th:data-current-page="${posts.number}"
               th:data-tag="${tag}"
               th:data-keyword="${keyword}"
               th:data-sort="${sort}">
            <thead>
                <tr>
                    <th class="col-no">번호</th>
                    <th>제목</th>
                    <th class="col-author">작성자</th>
                    <th class="col-date">날짜</th>
                    <th class="col-views">조회</th>
                    <th class="col-comments">댓글</th>
                    <th class="col-likes">♥</th>
                </tr>
            </thead>
            <tbody id="post-body">
                <tr th:if="${posts.content.empty}">
                    <td colspan="7" class="empty">게시물이 없습니다. 첫 글을 작성해보세요!</td>
                </tr>
                <!-- 차단된 사용자의 게시물은 렌더링하지 않는다 -->
                <tr th:each="post, stat : ${posts.content}"
                    th:unless="${blockedUsernames != null and blockedUsernames.contains(post.author)}">
                    <!-- 번호: 총 게시물 수에서 역순으로 표시 -->
                    <td class="col-no"
                        th:text="${posts.totalElements - (posts.number * posts.size) - stat.index}">1</td>
                    <td>
                        <a class="title-link"
                           th:href="@{/posts/{id}(id=${post.id})}"
                           th:text="${post.title}">제목</a>
                        <!-- 태그 뱃지: 클릭 시 해당 태그로 필터링 -->
                        <span th:if="${!#lists.isEmpty(post.tags)}">
                            <a th:each="t : ${post.tags}" class="tag tag-sm"
                               th:href="@{/boards/{slug}(slug=${board.slug}, tag=${t})}"
                               th:text="'#' + ${t}">태그</a>
                        </span>
                    </td>
                    <!-- 작성자 이름 클릭 → 프로필 페이지 -->
                    <td class="col-author">
                        <a class="author-link"
                           th:href="@{/users/{u}(u=${post.author})}"
                           th:text="${post.author}">작성자</a>
                    </td>
                    <td class="col-date"
                        th:text="${#temporals.format(post.createdAt, 'yy/MM/dd')}">날짜</td>
                    <td class="col-views"    th:text="${post.viewCount}">0</td>
                    <td class="col-comments" th:text="${post.commentCount}">0</td>
                    <td class="col-likes"    th:text="${post.likeCount}">0</td>
                </tr>
            </tbody>
        </table>

        <!-- 무한 스크롤 감지용 sentinel. JS가 이 요소를 관찰한다. -->
        <div id="scroll-sentinel"></div>

        <!-- 페이지네이션: JS 로드 후 숨겨지고 무한 스크롤로 대체 -->
        <div class="pagination" id="pagination" th:if="${posts.totalPages > 1}">
            <a th:if="${!posts.first}"
               th:href="@{/boards/{slug}(slug=${board.slug}, page=${posts.number - 1}, keyword=${keyword}, tag=${tag})}">&laquo; 이전</a>
            <th:block th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}">
                <span th:if="${i == posts.number}" class="current" th:text="${i + 1}">1</span>
                <a th:unless="${i == posts.number}"
                   th:href="@{/boards/{slug}(slug=${board.slug}, page=${i}, keyword=${keyword}, tag=${tag})}"
                   th:text="${i + 1}">1</a>
            </th:block>
            <a th:if="${!posts.last}"
               th:href="@{/boards/{slug}(slug=${board.slug}, page=${posts.number + 1}, keyword=${keyword}, tag=${tag})}">다음 &raquo;</a>
        </div>

    </div>
</main>

<script>
(function () {
    const table      = document.getElementById('post-table');
    const tbody      = document.getElementById('post-body');
    const sentinel   = document.getElementById('scroll-sentinel');
    const pagination = document.getElementById('pagination');
    if (!table || !sentinel) return;

    const boardSlug  = table.dataset.boardSlug || '';
    const tag        = table.dataset.tag        || '';
    const keyword    = table.dataset.keyword    || '';
    const sort       = table.dataset.sort       || 'latest'; // 정렬 기준 유지
    const totalPages = parseInt(table.dataset.totalPages || '1', 10);
    let   nextPage   = parseInt(table.dataset.currentPage || '0', 10) + 1;
    let   loading    = false;

    // 페이지가 1장뿐이면 무한 스크롤 불필요
    if (nextPage >= totalPages) { sentinel.remove(); return; }

    // 서버 렌더링 페이지네이션 숨김 — 무한 스크롤로 대체
    if (pagination) pagination.style.display = 'none';

    /**
     * /api/posts 에서 다음 페이지를 JSON으로 받아 <tr> 행을 생성 후 tbody에 추가한다.
     */
    function loadMore() {
        if (loading || nextPage >= totalPages) return;
        loading = true;
        sentinel.textContent = '불러오는 중…';

        const params = new URLSearchParams({ page: nextPage, size: 10 });
        if (boardSlug) params.set('boardSlug', boardSlug);
        if (tag)       params.set('tag', tag);
        if (keyword)   params.set('keyword', keyword);
        if (sort)      params.set('sort', sort); // 정렬 기준을 API 요청에 포함

        fetch('/api/posts?' + params)
            .then(r => r.json())
            .then(data => {
                data.content.forEach(post => {
                    const tr = document.createElement('tr');
                    const tagsHtml = (post.tags || [])
                        .map(t => `<a class="tag tag-sm" href="/boards/${boardSlug}?tag=${encodeURIComponent(t)}">#${t}</a>`)
                        .join('');
                    tr.innerHTML = `
                        <td class="col-no">-</td>
                        <td>
                            <a class="title-link" href="/posts/${post.id}">${escHtml(post.title)}</a>
                            ${tagsHtml}
                        </td>
                        <td class="col-author">
                            <a class="author-link" href="/users/${encodeURIComponent(post.author)}">${escHtml(post.author)}</a>
                        </td>
                        <td class="col-date">${fmtDate(post.createdAt)}</td>
                        <td class="col-views">${post.viewCount}</td>
                        <td class="col-comments">${post.commentCount}</td>
                        <td class="col-likes">${post.likeCount}</td>`;
                    tbody.appendChild(tr);
                });
                nextPage++;
                loading = false;
                if (nextPage >= totalPages) {
                    sentinel.textContent = '';
                    observer.disconnect();
                } else {
                    sentinel.textContent = '';
                }
            })
            .catch(() => {
                sentinel.textContent = '불러오기 실패. 스크롤하여 재시도…';
                loading = false;
            });
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function fmtDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        const yy = String(d.getFullYear()).slice(2);
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        return `${yy}/${mm}/${dd}`;
    }

    const observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) loadMore();
    }, { rootMargin: '200px' });

    observer.observe(sentinel);
})();
</script>
</body>
</html>
