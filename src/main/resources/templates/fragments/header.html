<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header">
    <div class="container">
        <!-- 사이트 로고: 클릭 시 게시판 목록(홈)으로 이동 -->
        <h1><a href="/">[ EFFECTIVE-DISCO BBS ]</a></h1>
        <nav>
            <sec:authorize access="isAuthenticated()">
                <!-- 로그인 상태: 사용자명·쪽지·알림·(관리자)·로그아웃 표시 -->
                <a class="author-link"
                   th:href="@{/users/{u}(u=${#authentication.name})}"
                   sec:authentication="name"></a>

                <!-- 쪽지 봉투: 미읽음 수 뱃지 포함 -->
                <span class="notif-wrap">
                    <a th:href="@{/messages}">&#9993;</a>
                    <span class="notif-badge"
                          th:if="${unreadMessageCount != null and unreadMessageCount > 0}"
                          th:text="${unreadMessageCount}"></span>
                </span>

                <!-- 알림 벨: 미읽음 수 뱃지 포함 -->
                <span class="notif-wrap">
                    <a th:href="@{/notifications}">&#9651;</a>
                    <span class="notif-badge"
                          th:if="${unreadCount != null and unreadCount > 0}"
                          th:text="${unreadCount}"></span>
                </span>

                <!-- 관리자에게만 관리 패널 링크 표시 (미처리 신고 배지 포함) -->
                <sec:authorize access="hasAuthority('ROLE_ADMIN')">
                    <span class="notif-wrap">
                        <a th:href="@{/admin}">[관리]</a>
                        <span class="notif-badge"
                              th:if="${pendingReportCount != null and pendingReportCount > 0}"
                              th:text="${pendingReportCount}"></span>
                    </span>
                </sec:authorize>

                <a th:href="@{/logout}"
                   onclick="return confirm('로그아웃 하시겠습니까?')">[로그아웃]</a>
            </sec:authorize>
            <sec:authorize access="!isAuthenticated()">
                <!-- 비로그인 상태: 로그인·회원가입 링크 표시 -->
                <a th:href="@{/login}">[로그인]</a>
                <a th:href="@{/signup}">[회원가입]</a>
            </sec:authorize>
        </nav>
    </div>
</header>
</body>
</html>
