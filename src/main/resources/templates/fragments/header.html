<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header">
    <div class="container">
        <!-- 사이트 로고: 클릭 시 게시판 목록(홈)으로 이동 -->
        <h1><a href="/">[ EFFECTIVE-DISCO BBS ]</a></h1>
        <nav>
            <sec:authorize access="isAuthenticated()">
                <!-- 로그인 상태: 사용자명·쪽지·알림·(관리자)·로그아웃 표시 -->
                <a class="author-link"
                   th:href="@{/users/{u}(u=${#authentication.name})}"
                   sec:authentication="name"></a>

                <!-- 북마크 -->
                <a th:href="@{/bookmarks}" title="북마크">☆</a>

                <!-- 내 초안 목록 -->
                <a th:href="@{/drafts}" title="내 초안">✎</a>

                <!-- 쪽지 봉투: 미읽음 수 뱃지 포함 -->
                <span class="notif-wrap">
                    <a th:href="@{/messages}">&#9993;</a>
                    <span class="notif-badge"
                          th:if="${unreadMessageCount != null and unreadMessageCount > 0}"
                          th:text="${unreadMessageCount}"></span>
                </span>

                <!-- 알림 벨: 미읽음 수 뱃지 포함. SSE가 연결되면 JS가 실시간으로 업데이트한다. -->
                <span class="notif-wrap">
                    <a th:href="@{/notifications}">&#9651;</a>
                    <span id="notif-badge-count"
                          class="notif-badge"
                          th:style="${unreadCount != null and unreadCount > 0} ? '' : 'display:none'"
                          th:text="${unreadCount != null} ? ${unreadCount} : 0">0</span>
                </span>

                <!-- 관리자에게만 관리 패널 링크 표시 (미처리 신고 배지 포함) -->
                <sec:authorize access="hasAuthority('ROLE_ADMIN')">
                    <span class="notif-wrap">
                        <a th:href="@{/admin}">[관리]</a>
                        <span class="notif-badge"
                              th:if="${pendingReportCount != null and pendingReportCount > 0}"
                              th:text="${pendingReportCount}"></span>
                    </span>
                </sec:authorize>

                <!-- 로그아웃은 CSRF 보호를 위해 POST로 처리해야 한다.
                     confirm() 취소 시 form 제출을 막기 위해 onsubmit 핸들러를 사용한다. -->
                <form th:action="@{/logout}" method="post" style="display:inline;"
                      onsubmit="return confirm('로그아웃 하시겠습니까?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-link">[로그아웃]</button>
                </form>
            </sec:authorize>
            <sec:authorize access="!isAuthenticated()">
                <!-- 비로그인 상태: 로그인·회원가입 링크 표시 -->
                <a th:href="@{/login}">[로그인]</a>
                <a th:href="@{/signup}">[회원가입]</a>
            </sec:authorize>
        </nav>
    </div>
</header>

<!--
    SSE(Server-Sent Events) 실시간 알림 뱃지 업데이트.
    로그인한 사용자에게만 EventSource 를 연결한다.
    브라우저가 탭을 닫거나 연결이 끊어지면 EventSource 가 자동으로 재연결을 시도한다.
    알림 목록 페이지로 이동해 읽음 처리가 완료되면 서버가 count=0 을 push해 뱃지가 사라진다.
-->
<script sec:authorize="isAuthenticated()">
(function () {
    const badge = document.getElementById('notif-badge-count');
    if (!badge) return;

    const es = new EventSource('/sse/notifications');

    // "unread-count" 이벤트 수신 시 뱃지 숫자 갱신
    es.addEventListener('unread-count', function (e) {
        const count = parseInt(e.data, 10);
        if (count > 0) {
            badge.textContent = count;
            badge.style.display = 'inline';
        } else {
            badge.style.display = 'none';
        }
    });

    // 오류 시 재연결은 브라우저 EventSource 가 자동 처리하므로 별도 로직 불필요
    es.onerror = function () {
        // 페이지 이탈 또는 네트워크 오류 — EventSource 자체 재연결 로직에 위임
    };
})();
</script>
</body>
</html>
