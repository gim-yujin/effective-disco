<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>쪽지 쓰기 — BBS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <div class="container">

        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <a th:href="@{/messages}">쪽지함</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <span>쪽지 쓰기</span>
        </div>

        <div class="form-box">
            <h2>쪽지 쓰기</h2>

            <!-- 전송 성공 메시지 -->
            <div class="alert alert-success" th:if="${successMsg}" th:text="${successMsg}"></div>

            <form th:action="@{/messages}" method="post"
                  th:object="${messageRequest}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label>받는 사람</label>
                    <input type="text" th:field="*{to}" placeholder="사용자명을 입력하세요">
                    <div class="alert" th:if="${#fields.hasErrors('to')}"
                         th:errors="*{to}">오류</div>
                </div>

                <div class="form-group">
                    <label>제목</label>
                    <input type="text" th:field="*{title}" placeholder="제목을 입력하세요" maxlength="100">
                    <div class="alert" th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}">오류</div>
                </div>

                <div class="form-group">
                    <label>내용</label>
                    <textarea th:field="*{content}" placeholder="내용을 입력하세요"></textarea>
                    <div class="alert" th:if="${#fields.hasErrors('content')}"
                         th:errors="*{content}">오류</div>
                </div>

                <button class="btn btn-primary" type="submit">[보내기]</button>
                <a class="btn" th:href="@{/messages}">취소</a>
            </form>
        </div>

    </div>
</main>
</body>
</html>
