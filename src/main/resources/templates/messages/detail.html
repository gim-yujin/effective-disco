<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${message.title} + ' — 쪽지'">쪽지</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <div class="container">

        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <a th:href="@{/messages}">쪽지함</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <span th:text="${message.title}">제목</span>
        </div>

        <a class="back-link" th:href="@{/messages}">&larr; 편지함으로</a>

        <!-- 쪽지 헤더 -->
        <div class="message-header">
            <h2 th:text="${message.title}">제목</h2>
            <div class="post-meta">
                <span>발신: <a class="author-link"
                               th:href="@{/users/{u}(u=${message.senderUsername})}"
                               th:text="${message.senderUsername}">발신자</a></span>
                <span>수신: <a class="author-link"
                               th:href="@{/users/{u}(u=${message.recipientUsername})}"
                               th:text="${message.recipientUsername}">수신자</a></span>
                <span th:text="${#temporals.format(message.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
            </div>
        </div>

        <!-- 쪽지 본문 -->
        <div class="message-body" th:text="${message.content}">내용</div>

        <!-- 답장 / 삭제 버튼 -->
        <div class="post-actions" style="margin-top:10px;">
            <a class="btn btn-primary"
               th:href="@{/messages/compose(to=${message.senderUsername})}"
               sec:authentication="name"
               th:if="${message.recipientUsername == #authentication.name}">[답장]</a>

            <!-- 받은 쪽지 삭제 -->
            <form th:if="${message.recipientUsername == #authentication.name}"
                  th:action="@{/messages/{id}/delete(id=${message.id})}"
                  method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="box" value="inbox">
                <button class="btn btn-danger" type="submit"
                        onclick="return confirm('삭제하시겠습니까?')">[삭제]</button>
            </form>

            <!-- 보낸 쪽지 삭제 -->
            <form th:if="${message.senderUsername == #authentication.name}"
                  th:action="@{/messages/{id}/delete(id=${message.id})}"
                  method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="box" value="sent">
                <button class="btn btn-danger" type="submit"
                        onclick="return confirm('삭제하시겠습니까?')">[삭제]</button>
            </form>
        </div>

    </div>
</main>
</body>
</html>
