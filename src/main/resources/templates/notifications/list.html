<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>알림 — BBS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <div class="container">

        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <span>알림</span>
        </div>

        <div class="toolbar">
            <h2>알림</h2>
            <form th:if="${unreadCount > 0}"
                  th:action="@{/notifications/read-all}"
                  method="post"
                  style="display:inline-flex; gap:8px; align-items:center;">
                <!-- 문제 해결:
                     목록 조회와 read-all 을 분리해 단순 페이지 진입이 bulk update 를 발생시키지 않게 한다.
                     사용자가 명시적으로 눌렀을 때만 read-all transition 이 실행되도록 POST 폼으로 노출한다. -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="page" th:value="${notificationPage != null ? notificationPage.number : 0}">
                <input type="hidden" name="size" th:value="${notificationPage != null ? notificationPage.size : 30}">
                <span th:text="|미읽음 ${unreadCount}건|">미읽음 0건</span>
                <button type="submit">모두 읽음</button>
            </form>
        </div>

        <!-- 알림 없음 -->
        <div th:if="${#lists.isEmpty(notifications)}" class="empty">
            알림이 없습니다.
        </div>

        <!-- 알림 목록: 각 항목은 해당 게시물/댓글로 이동하는 링크 -->
        <th:block th:each="n : ${notifications}">
            <a th:href="${n.link}" class="notif-item" th:classappend="${!n.read} ? ' unread' : ''">
                <!-- 알림 종류별 아이콘 -->
                <span class="notif-icon"
                      th:text="${n.type.name() == 'LIKE'} ? '♥' : (${n.type.name() == 'REPLY'} ? '↩' : '&#128172;')">&#128172;</span>
                <span class="notif-body">
                    <span class="notif-msg"  th:text="${n.message}"></span>
                    <span class="notif-time" th:text="${#temporals.format(n.createdAt, 'MM/dd HH:mm')}"></span>
                </span>
            </a>
        </th:block>

        <div class="pagination"
             th:if="${notificationPage != null and (notificationPage.number > 0 or notificationPage.hasNext())}">
            <a th:if="${notificationPage.number > 0}"
               th:href="@{/notifications(page=${notificationPage.number - 1}, size=${notificationPage.size})}">&laquo; 이전</a>
            <span class="current" th:text="${notificationPage.number + 1}">1</span>
            <a th:if="${notificationPage.hasNext()}"
               th:href="@{/notifications(page=${notificationPage.number + 1}, size=${notificationPage.size})}">다음 &raquo;</a>
        </div>

    </div>
</main>
</body>
</html>
