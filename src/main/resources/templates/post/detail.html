<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title} + ' — BBS'">게시물</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <div class="container">
        <!--
            빵 부스러기(breadcrumb).
            게시판이 지정된 게시물: 홈 > 게시판명 > 게시물제목
            미분류 게시물: 홈 > 게시물제목
        -->
        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <th:block th:if="${post.boardSlug != null}">
                <a th:href="@{/boards/{slug}(slug=${post.boardSlug})}"
                   th:text="${post.boardName}">게시판</a>
                <span class="breadcrumb-sep">&rsaquo;</span>
            </th:block>
            <span th:text="${post.title}">게시물 제목</span>
        </div>

        <!-- 목록으로 돌아가는 링크: 게시판이 있으면 게시판 목록, 없으면 홈 -->
        <a class="back-link"
           th:href="${post.boardSlug != null} ? '/boards/' + ${post.boardSlug} : '/'">&larr; 목록으로</a>

        <div class="post-header">
            <h2>
                <span th:if="${post.pinned}" class="pin-badge" title="공지 고정">📌</span>
                <span th:text="${post.title}">제목</span>
            </h2>
            <div class="post-meta">
                <span>작성자:
                    <!-- 작성자 이름 클릭 → 해당 사용자 프로필 페이지 -->
                    <a class="author-link"
                       th:href="@{/users/{u}(u=${post.author})}"
                       th:text="${post.author}">작성자</a>
                </span>
                <span>작성일: <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span></span>
                <span th:if="${post.updatedAt != null}">
                    수정일: <span th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
                </span>
                <span>조회: <span th:text="${post.viewCount}">0</span></span>
            </div>
        </div>
        <!-- 첨부 이미지 갤러리 (sortOrder 오름차순으로 표시) -->
        <div th:if="${!#lists.isEmpty(post.imageUrls)}" style="margin:12px 0;">
            <img th:each="url : ${post.imageUrls}" th:src="${url}" alt="첨부 이미지"
                 style="max-width:100%;display:block;margin-bottom:8px;border-radius:6px;border:1px solid #e0e0e0;">
        </div>

        <div class="post-body" th:text="${post.content}">내용</div>

        <div class="tag-list" th:if="${!#lists.isEmpty(post.tags)}">
            <a th:each="t : ${post.tags}" class="tag"
               th:href="@{/(tag=${t})}" th:text="'#' + ${t}">태그</a>
        </div>

        <div class="like-bar">
            <span class="like-count">&#x2665; <span th:text="${post.likeCount}">0</span></span>
            <sec:authorize access="isAuthenticated()">
                <form th:action="${liked}
                                 ? @{/posts/{id}/unlike(id=${post.id})}
                                 : @{/posts/{id}/like(id=${post.id})}"
                      method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-like"
                            th:classappend="${liked} ? ' liked' : ''"
                            th:text="${liked} ? '♥ 좋아요 취소' : '♡ 좋아요'">♡ 좋아요</button>
                </form>
                <!-- 북마크 버튼 -->
                <form th:action="${bookmarked}
                                 ? @{/posts/{id}/unbookmark(id=${post.id})}
                                 : @{/posts/{id}/bookmark(id=${post.id})}"
                      method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm"
                            th:text="${bookmarked} ? '★ 북마크 해제' : '☆ 북마크'">☆ 북마크</button>
                </form>
            </sec:authorize>
        </div>

        <!-- 플래시 메시지 (신고 결과 등) -->
        <div class="alert alert-success" th:if="${successMsg}" th:text="${successMsg}"></div>
        <div class="alert alert-danger"  th:if="${errorMsg}"   th:text="${errorMsg}"></div>

        <div class="post-actions" sec:authorize="isAuthenticated()"
             th:with="username=${#authentication.name}">
            <th:block th:if="${post.author == username}">
                <a class="btn" th:href="@{/posts/{id}/edit(id=${post.id})}">[수정]</a>
                <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-danger" type="submit"
                            onclick="return confirm('삭제하시겠습니까?')">[삭제]</button>
                </form>
            </th:block>
            <!-- 타인의 게시물 신고 버튼 -->
            <th:block th:if="${post.author != username}">
                <button class="btn btn-sm" type="button"
                        onclick="document.getElementById('report-post-form').classList.toggle('open')">[신고]</button>
            </th:block>
            <!-- 관리자: 고정 핀 토글 + 강제 삭제 -->
            <sec:authorize access="hasAuthority('ROLE_ADMIN')">
                <form th:action="@{/admin/posts/{id}/pin(id=${post.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="returnTo" th:value="'/posts/' + ${post.id}">
                    <button class="btn btn-sm" type="submit"
                            th:text="${post.pinned} ? '[📌 고정 해제]' : '[📌 고정]'">고정</button>
                </form>
                <th:block th:if="${post.author != username}">
                    <form th:action="@{/admin/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-danger btn-sm" type="submit"
                                onclick="return confirm('[관리자] 이 게시물을 삭제하시겠습니까?')">[강제삭제]</button>
                    </form>
                </th:block>
            </sec:authorize>
        </div>

        <!-- 게시물 신고 폼 (토글) -->
        <sec:authorize access="isAuthenticated()">
            <div id="report-post-form" class="reply-form-box"
                 th:if="${post.author != #authentication.name}">
                <form th:action="@{/reports/posts/{id}(id=${post.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="text" name="reason" placeholder="신고 사유를 입력하세요"
                               required maxlength="200" style="flex:1;">
                        <button class="btn btn-sm btn-danger" type="submit">[신고 접수]</button>
                        <button class="btn btn-sm" type="button"
                                onclick="document.getElementById('report-post-form').classList.remove('open')">취소</button>
                    </div>
                </form>
            </div>
        </sec:authorize>

        <!-- 댓글 목록 -->
        <div class="comments-section" id="comments">
            <h3>댓글 <span th:text="${post.commentCount}">0</span>개</h3>

            <div th:if="${#lists.isEmpty(comments)}" class="comment-item">
                <span style="color:#aaa;">첫 댓글을 남겨보세요.</span>
            </div>

            <div class="pagination" th:if="${commentsPage != null and commentsPage.totalPages > 1}">
                <a th:if="${!commentsPage.first}"
                   th:href="|/posts/${post.id}?commentPage=${commentsPage.number - 1}&commentSize=${commentsPage.size}#comments|">&laquo; 이전 댓글</a>
                <th:block th:each="i : ${#numbers.sequence(0, commentsPage.totalPages - 1)}">
                    <span th:if="${i == commentsPage.number}" class="current" th:text="${i + 1}">1</span>
                    <a th:unless="${i == commentsPage.number}"
                       th:href="|/posts/${post.id}?commentPage=${i}&commentSize=${commentsPage.size}#comments|"
                       th:text="${i + 1}">1</a>
                </th:block>
                <a th:if="${!commentsPage.last}"
                   th:href="|/posts/${post.id}?commentPage=${commentsPage.number + 1}&commentSize=${commentsPage.size}#comments|">다음 댓글 &raquo;</a>
            </div>

            <!-- 차단된 사용자의 댓글·대댓글 블록 전체를 건너뛴다 -->
            <th:block th:each="c : ${comments}"
                      th:unless="${blockedUsernames != null and blockedUsernames.contains(c.author)}">
                <!-- 댓글 -->
                <div class="comment-item" th:id="'comment-' + ${c.id}">
                    <!-- 미니 아바타: 프로필 이미지가 있으면 이미지, 없으면 이름 첫 글자 -->
                    <span class="comment-avatar">
                        <img th:if="${c.authorProfileImageUrl != null}"
                             th:src="${c.authorProfileImageUrl}" alt="">
                        <th:block th:unless="${c.authorProfileImageUrl != null}"
                                  th:text="${#strings.toUpperCase(#strings.substring(c.author, 0, 1))}">U</th:block>
                    </span>
                    <span class="comment-author">
                        <a class="author-link" th:href="@{/users/{u}(u=${c.author})}"
                           th:text="'[' + ${c.author} + ']'">작성자</a>
                    </span>
                    <span class="comment-content" th:text="${c.content}">내용</span>
                    <span class="comment-meta">
                        <span th:text="${#temporals.format(c.createdAt, 'MM/dd HH:mm')}">날짜</span>
                        <!-- 수정됨 표시: updatedAt 이 있으면 "(수정됨)" 뱃지 노출 -->
                        <span th:if="${c.updatedAt != null}" class="edited-badge">(수정됨)</span>
                        &nbsp;
                        <!-- 댓글 좋아요 -->
                        <sec:authorize access="isAuthenticated()">
                            <form th:if="${!c.likedByMe}"
                                  th:action="@{/posts/{postId}/comments/{id}/like(postId=${post.id}, id=${c.id})}"
                                  method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="commentPage" th:value="${commentsPage.number}">
                                <input type="hidden" name="commentSize" th:value="${commentsPage.size}">
                                <button class="btn btn-sm" type="submit">&#9825; <span th:text="${c.likeCount}">0</span></button>
                            </form>
                            <form th:if="${c.likedByMe}"
                                  th:action="@{/posts/{postId}/comments/{id}/unlike(postId=${post.id}, id=${c.id})}"
                                  method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="commentPage" th:value="${commentsPage.number}">
                                <input type="hidden" name="commentSize" th:value="${commentsPage.size}">
                                <button class="btn btn-sm" type="submit">&#9829; <span th:text="${c.likeCount}">0</span></button>
                            </form>
                        </sec:authorize>
                        <sec:authorize access="!isAuthenticated()">
                            <span class="comment-like-count">&#9825; <span th:text="${c.likeCount}">0</span></span>
                        </sec:authorize>
                        &nbsp;
                        <sec:authorize access="isAuthenticated()">
                            <button class="reply-toggle-btn"
                                    th:onclick="'toggleReply(' + ${c.id} + ')'">&#x21A9; 답글</button>
                            <!-- 본인 댓글: 수정·삭제 버튼 -->
                            <th:block th:if="${c.author == #authentication.name}">
                                &nbsp;
                                <button class="btn btn-sm" type="button"
                                        th:onclick="'toggleCommentEdit(' + ${c.id} + ')'">[수정]</button>
                                &nbsp;
                                <form th:action="@{/posts/{postId}/comments/{id}/delete(postId=${post.id}, id=${c.id})}"
                                      method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" name="commentPage" th:value="${commentsPage.number}">
                                    <input type="hidden" name="commentSize" th:value="${commentsPage.size}">
                                    <button class="btn btn-sm btn-danger" type="submit">[삭제]</button>
                                </form>
                            </th:block>
                            <!-- 타인 댓글 신고 -->
                            <th:block th:if="${c.author != #authentication.name}">
                                &nbsp;
                                <button class="btn btn-sm" type="button"
                                        th:onclick="'toggleCommentReport(' + ${c.id} + ')'">신고</button>
                            </th:block>
                            <!-- 관리자: 타인 댓글 강제 삭제 -->
                            <sec:authorize access="hasAuthority('ROLE_ADMIN')">
                                <th:block th:if="${c.author != #authentication.name}">
                                    &nbsp;
                                    <form th:action="@{/admin/comments/{id}/delete(id=${c.id})}"
                                          method="post" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="postId" th:value="${post.id}">
                                        <button class="btn btn-sm btn-danger" type="submit">[강제삭제]</button>
                                    </form>
                                </th:block>
                            </sec:authorize>
                        </sec:authorize>
                    </span>
                </div>

                <!-- 댓글 수정 폼 (본인만, 토글) -->
                <sec:authorize access="isAuthenticated()">
                    <div th:if="${c.author == #authentication.name}"
                         th:id="'edit-form-' + ${c.id}" class="reply-form-box">
                        <form th:action="@{/posts/{postId}/comments/{id}/edit(postId=${post.id}, id=${c.id})}"
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="commentPage" th:value="${commentsPage.number}">
                            <input type="hidden" name="commentSize" th:value="${commentsPage.size}">
                            <textarea name="content" th:text="${c.content}"></textarea>
                            <div>
                                <button class="btn btn-primary btn-sm" type="submit">[수정 완료]</button>
                                <button class="btn btn-sm" type="button"
                                        th:onclick="'toggleCommentEdit(' + ${c.id} + ')'">취소</button>
                            </div>
                        </form>
                    </div>
                </sec:authorize>

                <!-- 댓글 신고 폼 (토글) -->
                <sec:authorize access="isAuthenticated()">
                    <div th:id="'report-comment-form-' + ${c.id}" class="reply-form-box"
                         th:if="${c.author != #authentication.name}">
                        <form th:action="@{/reports/comments/{id}(id=${c.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="postId" th:value="${post.id}">
                            <div style="display:flex;gap:8px;align-items:center;">
                                <input type="text" name="reason" placeholder="신고 사유를 입력하세요"
                                       required maxlength="200" style="flex:1;">
                                <button class="btn btn-sm btn-danger" type="submit">[신고 접수]</button>
                                <button class="btn btn-sm" type="button"
                                        th:onclick="'toggleCommentReport(' + ${c.id} + ')'">취소</button>
                            </div>
                        </form>
                    </div>
                </sec:authorize>

                <!-- 대댓글 목록 -->
                <div class="replies-wrap" th:if="${!#lists.isEmpty(c.replies)}">
                    <th:block th:each="r : ${c.replies}">
                    <th:block th:unless="${blockedUsernames != null and blockedUsernames.contains(r.author)}">
                    <div class="reply-item" th:id="'comment-' + ${r.id}">
                        <span class="reply-author">
                            <span class="reply-arrow">↳</span>
                            <!-- 미니 아바타: 프로필 이미지가 있으면 이미지, 없으면 이름 첫 글자 -->
                            <span class="comment-avatar">
                                <img th:if="${r.authorProfileImageUrl != null}"
                                     th:src="${r.authorProfileImageUrl}" alt="">
                                <th:block th:unless="${r.authorProfileImageUrl != null}"
                                          th:text="${#strings.toUpperCase(#strings.substring(r.author, 0, 1))}">U</th:block>
                            </span>
                            <a class="author-link" th:href="@{/users/{u}(u=${r.author})}"
                               th:text="'[' + ${r.author} + ']'">작성자</a>
                        </span>
                        <span class="comment-content" th:text="${r.content}">내용</span>
                        <span class="comment-meta">
                            <span th:text="${#temporals.format(r.createdAt, 'MM/dd HH:mm')}">날짜</span>
                            <!-- 대댓글 수정됨 표시 -->
                            <span th:if="${r.updatedAt != null}" class="edited-badge">(수정됨)</span>
                            &nbsp;
                            <!-- 대댓글 좋아요 -->
                            <sec:authorize access="isAuthenticated()">
                                <form th:if="${!r.likedByMe}"
                                      th:action="@{/posts/{postId}/comments/{id}/like(postId=${post.id}, id=${r.id})}"
                                      method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" name="commentPage" th:value="${commentsPage.number}">
                                    <input type="hidden" name="commentSize" th:value="${commentsPage.size}">
                                    <button class="btn btn-sm" type="submit">&#9825; <span th:text="${r.likeCount}">0</span></button>
                                </form>
                                <form th:if="${r.likedByMe}"
                                      th:action="@{/posts/{postId}/comments/{id}/unlike(postId=${post.id}, id=${r.id})}"
                                      method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" name="commentPage" th:value="${commentsPage.number}">
                                    <input type="hidden" name="commentSize" th:value="${commentsPage.size}">
                                    <button class="btn btn-sm" type="submit">&#9829; <span th:text="${r.likeCount}">0</span></button>
                                </form>
                            </sec:authorize>
                            <sec:authorize access="!isAuthenticated()">
                                <span class="comment-like-count">&#9825; <span th:text="${r.likeCount}">0</span></span>
                            </sec:authorize>
                            <sec:authorize access="isAuthenticated()">
                                <!-- 본인 대댓글: 수정·삭제 버튼 -->
                                <th:block th:if="${r.author == #authentication.name}">
                                    &nbsp;
                                    <button class="btn btn-sm" type="button"
                                            th:onclick="'toggleReplyEdit(' + ${r.id} + ')'">[수정]</button>
                                    &nbsp;
                                    <form th:action="@{/posts/{postId}/comments/{id}/delete(postId=${post.id}, id=${r.id})}"
                                          method="post" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="commentPage" th:value="${commentsPage.number}">
                                        <input type="hidden" name="commentSize" th:value="${commentsPage.size}">
                                        <button class="btn btn-sm btn-danger" type="submit">[삭제]</button>
                                    </form>
                                </th:block>
                            </sec:authorize>
                        </span>
                    </div>
                    <!-- 대댓글 수정 폼 (본인만, 토글) -->
                    <sec:authorize access="isAuthenticated()">
                        <div th:if="${r.author == #authentication.name}"
                             th:id="'reply-edit-form-' + ${r.id}" class="reply-form-box">
                            <form th:action="@{/posts/{postId}/comments/{id}/edit(postId=${post.id}, id=${r.id})}"
                                  method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="commentPage" th:value="${commentsPage.number}">
                                <input type="hidden" name="commentSize" th:value="${commentsPage.size}">
                                <textarea name="content" th:text="${r.content}"></textarea>
                                <div>
                                    <button class="btn btn-primary btn-sm" type="submit">[수정 완료]</button>
                                    <button class="btn btn-sm" type="button"
                                            th:onclick="'toggleReplyEdit(' + ${r.id} + ')'">취소</button>
                                </div>
                            </form>
                        </div>
                    </sec:authorize>
                    </th:block>
                    </th:block>
                </div>

                <!-- 대댓글 작성 폼 (토글) -->
                <sec:authorize access="isAuthenticated()">
                    <div class="reply-form-box" th:id="'reply-form-' + ${c.id}">
                        <form th:action="@{/posts/{postId}/comments/{id}/replies(postId=${post.id}, id=${c.id})}"
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="commentPage" th:value="${commentsPage.number}">
                            <input type="hidden" name="commentSize" th:value="${commentsPage.size}">
                            <textarea name="content" placeholder="답글을 입력하세요"></textarea>
                            <div>
                                <button class="btn btn-primary btn-sm" type="submit">[답글 등록]</button>
                                <button class="btn btn-sm" type="button"
                                        th:onclick="'toggleReply(' + ${c.id} + ')'">취소</button>
                            </div>
                        </form>
                    </div>
                </sec:authorize>
            </th:block>

            <!-- 댓글 작성 -->
            <sec:authorize access="isAuthenticated()">
                <div class="comment-form">
                    <form th:action="@{/posts/{postId}/comments(postId=${post.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="commentSize" th:value="${commentsPage.size}">
                        <div class="form-group">
                            <textarea name="content" placeholder="댓글을 입력하세요"></textarea>
                        </div>
                        <button class="btn btn-primary" type="submit">[댓글 등록]</button>
                    </form>
                </div>
            </sec:authorize>
            <sec:authorize access="!isAuthenticated()">
                <div class="comment-form">
                    <p style="color:#888; font-size:13px;">
                        댓글을 작성하려면 <a th:href="@{/login}">로그인</a>이 필요합니다.
                    </p>
                </div>
            </sec:authorize>
        </div>
    </div>
</main>

<script>
function toggleReply(commentId) {
    const box = document.getElementById('reply-form-' + commentId);
    if (box) {
        box.classList.toggle('open');
        if (box.classList.contains('open')) {
            box.querySelector('textarea').focus();
        }
    }
}

function toggleCommentReport(commentId) {
    const box = document.getElementById('report-comment-form-' + commentId);
    if (box) {
        box.classList.toggle('open');
        if (box.classList.contains('open')) {
            box.querySelector('input[name="reason"]').focus();
        }
    }
}

// 댓글 수정 폼 토글: open 상태면 textarea에 포커스 설정

}
