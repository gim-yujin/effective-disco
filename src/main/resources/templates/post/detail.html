<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title} + ' — BBS'">게시물</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <div class="container">
        <!--
            빵 부스러기(breadcrumb).
            게시판이 지정된 게시물: 홈 > 게시판명 > 게시물제목
            미분류 게시물: 홈 > 게시물제목
        -->
        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <th:block th:if="${post.boardSlug != null}">
                <a th:href="@{/boards/{slug}(slug=${post.boardSlug})}"
                   th:text="${post.boardName}">게시판</a>
                <span class="breadcrumb-sep">&rsaquo;</span>
            </th:block>
            <span th:text="${post.title}">게시물 제목</span>
        </div>

        <!-- 목록으로 돌아가는 링크: 게시판이 있으면 게시판 목록, 없으면 홈 -->
        <a class="back-link"
           th:href="${post.boardSlug != null} ? '/boards/' + ${post.boardSlug} : '/'">&larr; 목록으로</a>

        <div class="post-header">
            <h2 th:text="${post.title}">제목</h2>
            <div class="post-meta">
                <span>작성자:
                    <!-- 작성자 이름 클릭 → 해당 사용자 프로필 페이지 -->
                    <a class="author-link"
                       th:href="@{/users/{u}(u=${post.author})}"
                       th:text="${post.author}">작성자</a>
                </span>
                <span>작성일: <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span></span>
                <span th:if="${post.updatedAt != null}">
                    수정일: <span th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
                </span>
                <span>조회: <span th:text="${post.viewCount}">0</span></span>
            </div>
        </div>
        <div class="post-body" th:text="${post.content}">내용</div>

        <div class="tag-list" th:if="${!#lists.isEmpty(post.tags)}">
            <a th:each="t : ${post.tags}" class="tag"
               th:href="@{/(tag=${t})}" th:text="'#' + ${t}">태그</a>
        </div>

        <div class="like-bar">
            <span class="like-count">&#x2665; <span th:text="${post.likeCount}">0</span></span>
            <sec:authorize access="isAuthenticated()">
                <form th:action="@{/posts/{id}/like(id=${post.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-like"
                            th:classappend="${liked} ? ' liked' : ''"
                            th:text="${liked} ? '♥ 좋아요 취소' : '♡ 좋아요'">♡ 좋아요</button>
                </form>
            </sec:authorize>
        </div>

        <div class="post-actions" sec:authorize="isAuthenticated()"
             th:with="username=${#authentication.name}">
            <th:block th:if="${post.author == username}">
                <a class="btn" th:href="@{/posts/{id}/edit(id=${post.id})}">[수정]</a>
                <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-danger" type="submit"
                            onclick="return confirm('삭제하시겠습니까?')">[삭제]</button>
                </form>
            </th:block>
        </div>

        <!-- 댓글 목록 -->
        <div class="comments-section" id="comments">
            <h3>댓글 <span th:text="${#lists.size(comments)}">0</span>개</h3>

            <div th:if="${#lists.isEmpty(comments)}" class="comment-item">
                <span style="color:#aaa;">첫 댓글을 남겨보세요.</span>
            </div>

            <th:block th:each="c : ${comments}">
                <!-- 댓글 -->
                <div class="comment-item" th:id="'comment-' + ${c.id}">
                    <span class="comment-author" th:text="'[' + ${c.author} + ']'">작성자</span>
                    <span class="comment-content" th:text="${c.content}">내용</span>
                    <span class="comment-meta">
                        <span th:text="${#temporals.format(c.createdAt, 'MM/dd HH:mm')}">날짜</span>
                        &nbsp;
                        <sec:authorize access="isAuthenticated()">
                            <button class="reply-toggle-btn"
                                    th:onclick="'toggleReply(' + ${c.id} + ')'">↩ 답글</button>
                            <th:block th:if="${c.author == #authentication.name}">
                                &nbsp;
                                <form th:action="@{/posts/{postId}/comments/{id}/delete(postId=${post.id}, id=${c.id})}"
                                      method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-danger" type="submit">[삭제]</button>
                                </form>
                            </th:block>
                        </sec:authorize>
                    </span>
                </div>

                <!-- 대댓글 목록 -->
                <div class="replies-wrap" th:if="${!#lists.isEmpty(c.replies)}">
                    <div class="reply-item" th:each="r : ${c.replies}">
                        <span class="reply-author">
                            <span class="reply-arrow">↳</span>
                            <span th:text="'[' + ${r.author} + ']'">작성자</span>
                        </span>
                        <span class="comment-content" th:text="${r.content}">내용</span>
                        <span class="comment-meta">
                            <span th:text="${#temporals.format(r.createdAt, 'MM/dd HH:mm')}">날짜</span>
                            <sec:authorize access="isAuthenticated()">
                                <th:block th:if="${r.author == #authentication.name}">
                                    &nbsp;
                                    <form th:action="@{/posts/{postId}/comments/{id}/delete(postId=${post.id}, id=${r.id})}"
                                          method="post" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-danger" type="submit">[삭제]</button>
                                    </form>
                                </th:block>
                            </sec:authorize>
                        </span>
                    </div>
                </div>

                <!-- 대댓글 작성 폼 (토글) -->
                <sec:authorize access="isAuthenticated()">
                    <div class="reply-form-box" th:id="'reply-form-' + ${c.id}">
                        <form th:action="@{/posts/{postId}/comments/{id}/replies(postId=${post.id}, id=${c.id})}"
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <textarea name="content" placeholder="답글을 입력하세요"></textarea>
                            <div>
                                <button class="btn btn-primary btn-sm" type="submit">[답글 등록]</button>
                                <button class="btn btn-sm" type="button"
                                        th:onclick="'toggleReply(' + ${c.id} + ')'">취소</button>
                            </div>
                        </form>
                    </div>
                </sec:authorize>
            </th:block>

            <!-- 댓글 작성 -->
            <sec:authorize access="isAuthenticated()">
                <div class="comment-form">
                    <form th:action="@{/posts/{postId}/comments(postId=${post.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="form-group">
                            <textarea name="content" placeholder="댓글을 입력하세요"></textarea>
                        </div>
                        <button class="btn btn-primary" type="submit">[댓글 등록]</button>
                    </form>
                </div>
            </sec:authorize>
            <sec:authorize access="!isAuthenticated()">
                <div class="comment-form">
                    <p style="color:#888; font-size:13px;">
                        댓글을 작성하려면 <a th:href="@{/login}">로그인</a>이 필요합니다.
                    </p>
                </div>
            </sec:authorize>
        </div>
    </div>
</main>

<script>
function toggleReply(commentId) {
    const box = document.getElementById('reply-form-' + commentId);
    if (box) {
        box.classList.toggle('open');
        if (box.classList.contains('open')) {
            box.querySelector('textarea').focus();
        }
    }
}
</script>
</body>
</html>
