<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? '게시물 수정 — BBS' : '글쓰기 — BBS'">글쓰기</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <div class="container">

        <!-- 빵 부스러기: 게시판이 지정된 경우 홈 > 게시판명 > 글쓰기 표시 -->
        <div class="breadcrumb" th:if="${board != null}">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <a th:href="@{/boards/{slug}(slug=${board.slug})}"
               th:text="${board.name}">게시판</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <span th:text="${isEdit} ? '수정' : '글쓰기'">글쓰기</span>
        </div>

        <!--
            신규 작성 모드이고 저장된 초안이 있을 때만 표시.
            각 항목의 [불러오기]를 클릭하면 해당 초안의 수정 폼(/posts/{id}/edit)으로 이동한다.
            초안을 이어서 편집한 뒤 [발행] 또는 [초안으로 저장]으로 마무리할 수 있다.
        -->
        <div th:if="${!isEdit and recentDrafts != null and !#lists.isEmpty(recentDrafts)}"
             style="margin-bottom:16px;padding:12px 16px;background:#f8f9fa;
                    border:1px solid #dde;border-radius:6px;">
            <p style="font-size:13px;font-weight:bold;color:#555;margin:0 0 8px;">
                💾 저장된 초안 불러오기
            </p>
            <div th:each="draft : ${recentDrafts}"
                 style="display:flex;align-items:center;justify-content:space-between;
                        padding:4px 0;border-top:1px solid #eee;">
                <!-- 초안 제목 (길면 말줄임) -->
                <span style="font-size:13px;color:#333;overflow:hidden;
                             text-overflow:ellipsis;white-space:nowrap;max-width:65%;"
                      th:text="${draft.title}">초안 제목</span>
                <span style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
                    <!-- 작성일 -->
                    <span style="font-size:12px;color:#aaa;"
                          th:text="${#temporals.format(draft.createdAt, 'MM/dd HH:mm')}">날짜</span>
                    <!-- 불러오기: 초안 수정 폼으로 이동 -->
                    <a class="btn btn-sm btn-primary"
                       th:href="@{/posts/{id}/edit(id=${draft.id})}">[불러오기]</a>
                </span>
            </div>
        </div>

        <div class="form-box">
            <h2 th:text="${isEdit} ? '게시물 수정' : '새 게시물 작성'">글쓰기</h2>

            <!--
                폼 액션:
                - 수정: POST /posts/{id}/edit
                - 신규: POST /boards/{slug}/posts  (게시판 slug를 URL에 포함)
            -->
            <form th:action="${isEdit}
                              ? @{/posts/{id}/edit(id=${postId})}
                              : @{/boards/{slug}/posts(slug=${postRequest.boardSlug})}"
                  th:object="${postRequest}" method="post"
                  enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <!-- boardSlug를 hidden 필드로 전송 (서버에서 URL path 값으로 덮어씀) -->
                <input type="hidden" th:field="*{boardSlug}">

                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" th:field="*{title}"
                           placeholder="제목을 입력하세요" maxlength="200" required>
                </div>
                <div class="form-group">
                    <label for="content">내용</label>
                    <textarea id="content" th:field="*{content}"
                              placeholder="내용을 입력하세요" required></textarea>
                </div>
                <div class="form-group">
                    <label for="tagsInput">태그
                        <span style="color:#888; font-size:12px;">(쉼표로 구분, 예: spring, java)</span>
                    </label>
                    <input type="text" id="tagsInput" th:field="*{tagsInput}"
                           placeholder="spring, java, ...">
                </div>
                <div class="form-group">
                    <label for="images">이미지 첨부
                        <span style="color:#888; font-size:12px;">(JPEG·PNG·GIF·WebP, 5MB 이하, 여러 장 선택 가능)</span>
                    </label>
                    <!-- 수정 시 기존 이미지 미리보기 — 새 파일을 선택하면 교체됨 -->
                    <div th:if="${isEdit and !#lists.isEmpty(existingImages)}"
                         style="margin-bottom:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end;">
                        <img th:each="url : ${existingImages}" th:src="${url}" alt="현재 이미지"
                             style="max-height:100px;border-radius:4px;border:1px solid #ddd;">
                        <span style="font-size:12px;color:#888;">새 파일을 선택하면 기존 이미지가 교체됩니다.</span>
                    </div>
                    <div class="alert alert-danger" th:if="${errorMsg}" th:text="${errorMsg}"></div>
                    <!-- multiple 속성으로 여러 파일 동시 선택 가능 -->
                    <input type="file" id="images" name="images" accept="image/*" multiple>
                </div>
                <!--
                    hidden 필드 draft를 JS로 조작해 두 버튼이 서로 다른 값을 제출한다.
                    "등록/저장/발행" → draft=false (공개)
                    "초안으로 저장"  → draft=true  (비공개)
                -->
                <input type="hidden" name="draft" id="draft-input" value="false">
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <!-- 공개 버튼: 초안이었던 게시물을 수정 중이면 "발행", 아니면 "등록/저장" -->
                    <button class="btn btn-primary" type="submit"
                            onclick="document.getElementById('draft-input').value='false'">
                        <span th:text="${isEdit} ? (${isDraft} ? '[발행]' : '[저장]') : '[등록]'">[등록]</span>
                    </button>
                    <!-- 초안 저장 버튼: 공개하지 않고 임시 저장 -->
                    <button class="btn" type="submit"
                            onclick="document.getElementById('draft-input').value='true'">[초안으로 저장]</button>
                    <!-- 취소: 수정이면 게시물 상세로, 신규면 게시판 목록(또는 홈)으로 -->
                    <a class="btn" th:href="${isEdit}
                        ? @{/posts/{id}(id=${postId})}
                        : (${postRequest.boardSlug != null}
                            ? '/boards/' + ${postRequest.boardSlug}
                            : '/')">[취소]</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
