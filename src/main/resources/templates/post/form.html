<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? '게시물 수정 — BBS' : '글쓰기 — BBS'">글쓰기</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <div class="container">
        <div class="form-box">
            <h2 th:text="${isEdit} ? '게시물 수정' : '새 게시물 작성'">글쓰기</h2>

            <form th:action="${isEdit} ? @{/posts/{id}/edit(id=${postId})} : @{/posts}"
                  th:object="${postRequest}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" th:field="*{title}"
                           placeholder="제목을 입력하세요" maxlength="200" required>
                </div>
                <div class="form-group">
                    <label for="content">내용</label>
                    <textarea id="content" th:field="*{content}"
                              placeholder="내용을 입력하세요" required></textarea>
                </div>
                <div class="form-group">
                    <label for="tagsInput">태그
                        <span style="color:#888; font-size:12px;">(쉼표로 구분, 예: spring, java)</span>
                    </label>
                    <input type="text" id="tagsInput" th:field="*{tagsInput}"
                           placeholder="spring, java, ...">
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-primary" type="submit">
                        <span th:text="${isEdit} ? '[저장]' : '[등록]'">[등록]</span>
                    </button>
                    <a class="btn" th:href="${isEdit} ? @{/posts/{id}(id=${postId})} : @{/}">[취소]</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
