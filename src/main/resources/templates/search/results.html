<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>검색 — BBS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <div class="container">

        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <span>통합 검색</span>
        </div>

        <!-- 검색 폼 -->
        <form class="search-form" action="/search" method="get" style="margin-bottom:8px;">
            <input type="text" name="q" class="search-input"
                   placeholder="검색 (제목/내용, #태그명, @작성자명)"
                   th:value="${q}" autofocus>
            <button type="submit" class="btn btn-search">검색</button>
            <a th:if="${q != null and !q.isBlank()}"
               href="/search" class="btn btn-reset">초기화</a>
        </form>

        <!-- 검색 힌트 -->
        <div style="font-size:12px; color:#999; margin-bottom:14px;">
            <span class="tag tag-sm" style="cursor:pointer;"
                  onclick="document.querySelector('[name=q]').value='#'; document.querySelector('[name=q]').focus()">#태그</span>
            <span style="margin:0 4px; color:#ccc;">·</span>
            <span class="tag tag-sm" style="cursor:pointer;"
                  onclick="document.querySelector('[name=q]').value='@'; document.querySelector('[name=q]').focus()">@작성자</span>
            <span style="margin:0 4px; color:#ccc;">·</span>
            <span style="color:#bbb;">접두사 없이 입력하면 제목/내용에서 검색</span>
        </div>

        <!-- 인기 태그 -->
        <div class="tag-filter-bar" th:if="${!#lists.isEmpty(popularTags)}">
            <span class="tag-filter-label">인기 태그:</span>
            <a th:each="t : ${popularTags}" class="tag tag-sm"
               th:href="@{/search(q='#' + ${t})}"
               th:text="'#' + ${t}">태그</a>
        </div>

        <!-- 검색 결과 -->
        <th:block th:if="${posts != null}">
            <div class="toolbar">
                <h2>
                    <!-- 태그 검색 -->
                    <th:block th:if="${type == 'tag'}">
                        <span style="color:#888;">#</span><span th:text="${searchTarget}"></span>
                        태그 검색결과 &mdash; <span th:text="${posts.totalElements}">0</span>건
                    </th:block>
                    <!-- 작성자 검색 -->
                    <th:block th:if="${type == 'author'}">
                        <span style="color:#888;">@</span><a th:href="@{/users/{u}(u=${searchTarget})}"
                           th:text="${searchTarget}" style="color:inherit;"></a>
                        작성자 검색결과 &mdash; <span th:text="${posts.totalElements}">0</span>건
                    </th:block>
                    <!-- 키워드 검색 -->
                    <th:block th:if="${type == 'keyword'}">
                        &ldquo;<span th:text="${q}"></span>&rdquo; 검색결과
                        &mdash; <span th:text="${posts.totalElements}">0</span>건
                    </th:block>
                </h2>
            </div>

            <!-- 사용자를 찾을 수 없음 -->
            <div th:if="${userNotFound}" class="empty" style="padding:20px 0;">
                <strong th:text="'@' + ${searchTarget}"></strong> 사용자를 찾을 수 없습니다.
            </div>

            <table class="board-table" id="search-table"
                   th:unless="${userNotFound}"
                   th:data-q="${q}"
                   th:data-type="${type}"
                   th:data-total-pages="${posts.totalPages}"
                   th:data-current-page="${posts.number}">
                <thead>
                    <tr>
                        <th th:unless="${type == 'author'}">게시판</th>
                        <th>제목</th>
                        <th class="col-author" th:unless="${type == 'author'}">작성자</th>
                        <th class="col-date">날짜</th>
                        <th class="col-views">조회</th>
                    </tr>
                </thead>
                <tbody id="search-body">
                    <tr th:if="${posts.content.empty}">
                        <td th:colspan="${type == 'author'} ? 3 : 5" class="empty">검색 결과가 없습니다.</td>
                    </tr>
                    <tr th:each="post : ${posts.content}">
                        <td class="col-board-name" th:unless="${type == 'author'}">
                            <a th:if="${post.boardSlug != null}"
                               th:href="@{/boards/{s}(s=${post.boardSlug})}"
                               th:text="${post.boardName}" class="tag tag-sm">게시판</a>
                            <span th:if="${post.boardSlug == null}" style="color:#aaa">미분류</span>
                        </td>
                        <td>
                            <a class="title-link" th:href="@{/posts/{id}(id=${post.id})}"
                               th:text="${post.title}">제목</a>
                        </td>
                        <td class="col-author" th:unless="${type == 'author'}">
                            <a class="author-link"
                               th:href="@{/users/{u}(u=${post.author})}"
                               th:text="${post.author}">작성자</a>
                        </td>
                        <td class="col-date"
                            th:text="${#temporals.format(post.createdAt, 'yy/MM/dd')}">날짜</td>
                        <td class="col-views" th:text="${post.viewCount}">0</td>
                    </tr>
                </tbody>
            </table>

            <!-- 페이지네이션 -->
            <div class="pagination" th:if="${posts.totalPages > 1 and !userNotFound}" id="pagination">
                <a th:if="${!posts.first}"
                   th:href="@{/search(q=${q}, page=${posts.number - 1})}">&laquo; 이전</a>
                <th:block th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}">
                    <span th:if="${i == posts.number}" class="current" th:text="${i + 1}">1</span>
                    <a th:unless="${i == posts.number}"
                       th:href="@{/search(q=${q}, page=${i})}"
                       th:text="${i + 1}">1</a>
                </th:block>
                <a th:if="${!posts.last}"
                   th:href="@{/search(q=${q}, page=${posts.number + 1})}">다음 &raquo;</a>
            </div>
        </th:block>

        <!-- 검색어 없음 -->
        <div th:if="${posts == null}" class="empty" style="padding:40px;">
            검색어를 입력하세요.
        </div>

    </div>
</main>

<script>
// 키워드 검색일 때만 제목 하이라이트
(function() {
    const table = document.querySelector('#search-table');
    if (!table || table.dataset.type !== 'keyword') return;

    const q = table.dataset.q?.trim();
    if (!q) return;

    const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('(' + escaped + ')', 'gi');

    document.querySelectorAll('#search-body .title-link').forEach(el => {
        el.innerHTML = el.textContent.replace(re, '<mark>$1</mark>');
    });
})();
</script>
</body>
</html>
