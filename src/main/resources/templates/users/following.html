<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${profile.username} + ' — 팔로잉'">팔로잉</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <div class="container">

        <!-- 빵 부스러기 -->
        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <a th:href="@{/users/{u}(u=${profile.username})}" th:text="${profile.username}">사용자</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <span>팔로잉</span>
        </div>

        <div class="toolbar">
            <h2>
                <a th:href="@{/users/{u}(u=${profile.username})}" th:text="${profile.username}">사용자</a>
                님이 팔로우하는 사람 (<span th:text="${#lists.size(followings)}">0</span>명)
            </h2>
        </div>

        <!-- 팔로잉이 없을 때 -->
        <div th:if="${#lists.isEmpty(followings)}" class="empty" style="padding:30px;">
            아직 팔로우하는 사람이 없습니다.
        </div>

        <!--
            팔로잉 목록.
            각 카드는 아바타(프로필 이미지 또는 이니셜) + username + bio로 구성된다.
        -->
        <div class="user-list" th:unless="${#lists.isEmpty(followings)}">
            <div class="user-card" th:each="u : ${followings}">
                <!-- 아바타: 프로필 이미지가 있으면 이미지, 없으면 이름 첫 글자 -->
                <div class="user-card-avatar">
                    <img th:if="${u.profileImageUrl != null}"
                         th:src="${u.profileImageUrl}" alt="프로필 사진">
                    <span th:unless="${u.profileImageUrl != null}"
                          th:text="${#strings.toUpperCase(#strings.substring(u.username, 0, 1))}">U</span>
                </div>
                <div class="user-card-info">
                    <a class="user-card-name"
                       th:href="@{/users/{u}(u=${u.username})}"
                       th:text="${u.username}">username</a>
                    <p class="user-card-bio" th:if="${u.bio != null}" th:text="${u.bio}"></p>
                </div>
            </div>
        </div>

    </div>
</main>
</body>
</html>
