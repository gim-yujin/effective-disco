<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${profile.username} + ' — 프로필'">프로필</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <div class="container">

        <!-- 빵 부스러기 -->
        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <span th:text="${profile.username}">사용자</span>
        </div>

        <!-- ── 프로필 카드 ──────────────────────────────────── -->
        <div class="profile-card">
            <div class="profile-avatar">
                <!-- 아바타: 이름 첫 글자를 대문자로 표시 -->
                <span th:text="${#strings.toUpperCase(#strings.substring(profile.username, 0, 1))}">U</span>
            </div>
            <div class="profile-info">
                <h2 class="profile-username" th:text="${profile.username}">username</h2>
                <p class="profile-joined">
                    가입일:
                    <span th:text="${#temporals.format(profile.createdAt, 'yyyy년 MM월 dd일')}">날짜</span>
                </p>
                <!-- 본인 프로필이 아닌 경우 쪽지 보내기 버튼 표시 -->
                <sec:authorize access="isAuthenticated()">
                    <a th:if="${profile.username != #authentication.name}"
                       class="btn btn-sm"
                       th:href="@{/messages/compose(to=${profile.username})}"
                       style="margin-top:8px;display:inline-block;">&#9993; 쪽지 보내기</a>
                </sec:authorize>
            </div>
        </div>

        <!-- ── 활동 통계 ──────────────────────────────────────── -->
        <div class="profile-stats">
            <div class="stat-box">
                <span class="stat-num" th:text="${profile.postCount}">0</span>
                <span class="stat-label">게시물</span>
            </div>
            <div class="stat-box">
                <span class="stat-num" th:text="${profile.commentCount}">0</span>
                <span class="stat-label">댓글</span>
            </div>
            <div class="stat-box">
                <span class="stat-num likes" th:text="${profile.likesReceived}">0</span>
                <span class="stat-label">받은 좋아요</span>
            </div>
        </div>

        <!-- ── 작성한 게시물 목록 ─────────────────────────────── -->
        <div class="toolbar" style="margin-top: 24px;">
            <h3>작성한 게시물</h3>
        </div>

        <table class="board-table">
            <thead>
                <tr>
                    <th class="col-no">번호</th>
                    <th>제목</th>
                    <!-- 게시판 정보가 있는 경우 표시 -->
                    <th class="col-board-name">게시판</th>
                    <th class="col-date">날짜</th>
                    <th class="col-views">조회</th>
                    <th class="col-comments">댓글</th>
                    <th class="col-likes">♥</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${posts.content.empty}">
                    <td colspan="7" class="empty">작성한 게시물이 없습니다.</td>
                </tr>
                <tr th:each="post, stat : ${posts.content}">
                    <td class="col-no"
                        th:text="${posts.totalElements - (posts.number * posts.size) - stat.index}">1</td>
                    <td>
                        <a class="title-link"
                           th:href="@{/posts/{id}(id=${post.id})}"
                           th:text="${post.title}">제목</a>
                        <!-- 태그 뱃지 -->
                        <span th:if="${!#lists.isEmpty(post.tags)}">
                            <a th:each="t : ${post.tags}" class="tag tag-sm"
                               th:href="${post.boardSlug != null}
                                        ? '/boards/' + ${post.boardSlug} + '?tag=' + ${t}
                                        : '/?tag=' + ${t}"
                               th:text="'#' + ${t}">태그</a>
                        </span>
                    </td>
                    <td class="col-board-name">
                        <!-- 게시판이 지정된 경우 게시판 링크 표시, 미지정이면 "—" -->
                        <a th:if="${post.boardSlug != null}"
                           class="board-name-link"
                           th:href="@{/boards/{slug}(slug=${post.boardSlug})}"
                           th:text="${post.boardName}">게시판</a>
                        <span th:unless="${post.boardSlug != null}" style="color:#bbb;">—</span>
                    </td>
                    <td class="col-date"
                        th:text="${#temporals.format(post.createdAt, 'yy/MM/dd')}">날짜</td>
                    <td class="col-views"    th:text="${post.viewCount}">0</td>
                    <td class="col-comments" th:text="${post.commentCount}">0</td>
                    <td class="col-likes"    th:text="${post.likeCount}">0</td>
                </tr>
            </tbody>
        </table>

        <!-- 페이지네이션 -->
        <div class="pagination" th:if="${posts.totalPages > 1}">
            <a th:if="${!posts.first}"
               th:href="@{/users/{u}(u=${profile.username}, page=${posts.number - 1})}">&laquo; 이전</a>
            <th:block th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}">
                <span th:if="${i == posts.number}" class="current" th:text="${i + 1}">1</span>
                <a th:unless="${i == posts.number}"
                   th:href="@{/users/{u}(u=${profile.username}, page=${i})}"
                   th:text="${i + 1}">1</a>
            </th:block>
            <a th:if="${!posts.last}"
               th:href="@{/users/{u}(u=${profile.username}, page=${posts.number + 1})}">다음 &raquo;</a>
        </div>

    </div>
</main>
</body>
</html>
