<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${profile.username} + ' — 프로필'">프로필</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <div class="container">

        <!-- 빵 부스러기 -->
        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <span th:text="${profile.username}">사용자</span>
        </div>

        <!-- ── 프로필 카드 ──────────────────────────────────── -->
        <div class="profile-card">
            <div class="profile-avatar">
                <!--
                    아바타: 프로필 이미지가 등록되어 있으면 이미지를 표시하고,
                    없으면 이름 첫 글자를 이니셜로 표시한다.
                -->
                <img th:if="${profile.profileImageUrl != null}"
                     th:src="${profile.profileImageUrl}" alt="프로필 사진">
                <span th:unless="${profile.profileImageUrl != null}"
                      th:text="${#strings.toUpperCase(#strings.substring(profile.username, 0, 1))}">U</span>
            </div>
            <div class="profile-info">
                <h2 class="profile-username" th:text="${profile.username}">username</h2>
                <p class="profile-joined">
                    가입일:
                    <span th:text="${#temporals.format(profile.createdAt, 'yyyy년 MM월 dd일')}">날짜</span>
                </p>
                <sec:authorize access="isAuthenticated()">
                    <!-- 본인 프로필: 설정 버튼 -->
                    <a th:if="${profile.username == #authentication.name}"
                       class="btn btn-sm"
                       th:href="@{/settings}"
                       style="margin-top:8px;display:inline-block;">&#9881; 설정</a>
                    <!-- 타인 프로필: 쪽지 + 팔로우/언팔로우 + 차단/차단해제 버튼 -->
                    <span th:if="${profile.username != #authentication.name}"
                          style="margin-top:8px;display:inline-flex;gap:6px;flex-wrap:wrap;">
                        <a class="btn btn-sm"
                           th:href="@{/messages/compose(to=${profile.username})}">&#9993; 쪽지</a>
                        <!-- 팔로우 토글 폼 -->
                        <form th:action="@{/users/{u}/follow(u=${profile.username})}" method="post"
                              style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm"
                                    th:classappend="${isFollowing} ? ' btn-primary' : ''"
                                    type="submit"
                                    th:text="${isFollowing} ? '팔로우 중 ✓' : '+ 팔로우'">팔로우</button>
                        </form>
                        <!-- 차단 토글 폼 — 차단 중이면 btn-danger 스타일 적용 -->
                        <form th:action="@{/users/{u}/block(u=${profile.username})}" method="post"
                              style="display:inline;"
                              th:onsubmit="${isBlocking} ? 'return confirm(\'차단을 해제하시겠습니까?\')' : 'return confirm(\'이 사용자를 차단하시겠습니까? 차단하면 이 사용자의 게시물과 댓글이 숨겨집니다.\')'">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm"
                                    th:classappend="${isBlocking} ? ' btn-danger' : ''"
                                    type="submit"
                                    th:text="${isBlocking} ? '🚫 차단 해제' : '🚫 차단'">차단</button>
                        </form>
                    </span>
                </sec:authorize>
                <!-- bio 표시 -->
                <p th:if="${profile.bio != null}" class="profile-bio"
                   th:text="${profile.bio}" style="margin-top:8px;color:#555;font-size:14px;"></p>
            </div>
        </div>

        <!-- ── 활동 통계 ──────────────────────────────────────── -->
        <div class="profile-stats">
            <div class="stat-box">
                <span class="stat-num" th:text="${profile.postCount}">0</span>
                <span class="stat-label">게시물</span>
            </div>
            <div class="stat-box">
                <span class="stat-num" th:text="${profile.commentCount}">0</span>
                <span class="stat-label">댓글</span>
            </div>
            <div class="stat-box">
                <span class="stat-num likes" th:text="${profile.likesReceived}">0</span>
                <span class="stat-label">받은 좋아요</span>
            </div>
            <!-- 팔로우 통계 -->
            <div class="stat-box">
                <span class="stat-num" th:text="${profile.followerCount}">0</span>
                <span class="stat-label">팔로워</span>
            </div>
            <div class="stat-box">
                <span class="stat-num" th:text="${profile.followingCount}">0</span>
                <span class="stat-label">팔로잉</span>
            </div>
        </div>

        <!-- ── 작성한 게시물 목록 ─────────────────────────────── -->
        <div class="toolbar" style="margin-top: 24px;">
            <h3>작성한 게시물</h3>
        </div>

        <table class="board-table">
            <thead>
                <tr>
                    <th class="col-no">번호</th>
                    <th>제목</th>
                    <!-- 게시판 정보가 있는 경우 표시 -->
                    <th class="col-board-name">게시판</th>
                    <th class="col-date">날짜</th>
                    <th class="col-views">조회</th>
                    <th class="col-comments">댓글</th>
                    <th class="col-likes">♥</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${posts.content.empty}">
                    <td colspan="7" class="empty">작성한 게시물이 없습니다.</td>
                </tr>
                <tr th:each="post, stat : ${posts.content}">
                    <td class="col-no"
                        th:text="${posts.totalElements - (posts.number * posts.size) - stat.index}">1</td>
                    <td>
                        <a class="title-link"
                           th:href="@{/posts/{id}(id=${post.id})}"
                           th:text="${post.title}">제목</a>
                        <!-- 태그 뱃지 -->
                        <span th:if="${!#lists.isEmpty(post.tags)}">
                            <a th:each="t : ${post.tags}" class="tag tag-sm"
                               th:href="${post.boardSlug != null}
                                        ? '/boards/' + ${post.boardSlug} + '?tag=' + ${t}
                                        : '/?tag=' + ${t}"
                               th:text="'#' + ${t}">태그</a>
                        </span>
                    </td>
                    <td class="col-board-name">
                        <!-- 게시판이 지정된 경우 게시판 링크 표시, 미지정이면 "—" -->
                        <a th:if="${post.boardSlug != null}"
                           class="board-name-link"
                           th:href="@{/boards/{slug}(slug=${post.boardSlug})}"
                           th:text="${post.boardName}">게시판</a>
                        <span th:unless="${post.boardSlug != null}" style="color:#bbb;">—</span>
                    </td>
                    <td class="col-date"
                        th:text="${#temporals.format(post.createdAt, 'yy/MM/dd')}">날짜</td>
                    <td class="col-views"    th:text="${post.viewCount}">0</td>
                    <td class="col-comments" th:text="${post.commentCount}">0</td>
                    <td class="col-likes"    th:text="${post.likeCount}">0</td>
                </tr>
            </tbody>
        </table>

        <!-- 페이지네이션 -->
        <div class="pagination" th:if="${posts.totalPages > 1}">
            <a th:if="${!posts.first}"
               th:href="@{/users/{u}(u=${profile.username}, page=${posts.number - 1})}">&laquo; 이전</a>
            <th:block th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}">
                <span th:if="${i == posts.number}" class="current" th:text="${i + 1}">1</span>
                <a th:unless="${i == posts.number}"
                   th:href="@{/users/{u}(u=${profile.username}, page=${i})}"
                   th:text="${i + 1}">1</a>
            </th:block>
            <a th:if="${!posts.last}"
               th:href="@{/users/{u}(u=${profile.username}, page=${posts.number + 1})}">다음 &raquo;</a>
        </div>

    </div>
</main>
</body>
</html>
