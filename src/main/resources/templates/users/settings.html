<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>설정 — BBS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <div class="container">

        <div class="breadcrumb">
            <a th:href="@{/}">홈</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <a th:href="@{/users/{u}(u=${profile.username})}" th:text="${profile.username}">사용자</a>
            <span class="breadcrumb-sep">&rsaquo;</span>
            <span>설정</span>
        </div>

        <!-- ── 프로필 사진 변경 ──────────────────────────────── -->
        <div class="form-box">
            <h2>프로필 사진</h2>

            <div class="alert alert-success" th:if="${profileMsg}" th:text="${profileMsg}"></div>
            <div class="alert alert-danger"  th:if="${profileError}" th:text="${profileError}"></div>

            <!-- 현재 프로필 사진 미리보기 -->
            <div class="profile-image-preview">
                <img th:if="${profile.profileImageUrl != null}"
                     th:src="${profile.profileImageUrl}" alt="현재 프로필 사진">
                <span th:unless="${profile.profileImageUrl != null}"
                      th:text="${#strings.toUpperCase(#strings.substring(profile.username, 0, 1))}">U</span>
            </div>

            <!--
                multipart/form-data 인코딩: 파일 업로드에 필수.
                ImageService가 JPEG·PNG·GIF·WebP·최대 5MB를 검증한다.
            -->
            <form th:action="@{/settings/profile-image}" method="post"
                  enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label>새 이미지 (JPEG·PNG·GIF·WebP, 최대 5MB)</label>
                    <input type="file" name="image" accept="image/*" required>
                </div>
                <button class="btn btn-primary" type="submit">[사진 변경]</button>
            </form>
        </div>

        <!-- ── 프로필 편집 ───────────────────────────────────── -->
        <div class="form-box" style="margin-top:24px;">
            <h2>프로필 편집</h2>

            <!-- bio/email 변경 결과 메시지 (프로필 사진 메시지와 구분된 flash attribute 사용) -->
            <div class="alert alert-success" th:if="${bioMsg}"   th:text="${bioMsg}"></div>
            <div class="alert alert-danger"  th:if="${bioError}" th:text="${bioError}"></div>

            <form th:action="@{/settings/profile}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" name="email" th:value="${profile.email}"
                           placeholder="이메일" maxlength="100">
                </div>

                <div class="form-group">
                    <label>자기소개</label>
                    <textarea name="bio" placeholder="자기소개를 입력하세요 (최대 300자)"
                              maxlength="300" rows="4"
                              th:text="${profile.bio}"></textarea>
                </div>

                <button class="btn btn-primary" type="submit">[저장]</button>
                <a class="btn" th:href="@{/users/{u}(u=${profile.username})}">취소</a>
            </form>
        </div>

        <!-- ── 비밀번호 변경 ─────────────────────────────────── -->
        <div class="form-box" style="margin-top:24px;">
            <h2>비밀번호 변경</h2>

            <div class="alert alert-success" th:if="${passwordMsg}" th:text="${passwordMsg}"></div>
            <div class="alert alert-danger"  th:if="${passwordError}" th:text="${passwordError}"></div>

            <form th:action="@{/settings/password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label>현재 비밀번호</label>
                    <input type="password" name="currentPassword" placeholder="현재 비밀번호" required>
                </div>
                <div class="form-group">
                    <label>새 비밀번호</label>
                    <input type="password" name="newPassword" placeholder="새 비밀번호 (6자 이상)" required minlength="6">
                </div>
                <div class="form-group">
                    <label>새 비밀번호 확인</label>
                    <input type="password" name="confirmPassword" placeholder="새 비밀번호 확인" required minlength="6">
                </div>

                <button class="btn btn-primary" type="submit">[비밀번호 변경]</button>
            </form>
        </div>

        <!-- ── 차단 관리 ─────────────────────────────────────── -->
        <div class="form-box" style="margin-top:24px;">
            <h2>차단 관리</h2>
            <p style="color:#888; font-size:13px; margin-bottom:12px;">
                차단한 사용자의 게시물과 댓글은 목록에서 숨겨집니다.
            </p>
            <a class="btn" th:href="@{/blocks}">[차단 목록 보기]</a>
        </div>

        <!-- ── 회원 탈퇴 ─────────────────────────────────────── -->
        <div class="form-box" style="margin-top:24px; border-color:#e55;">
            <h2 style="color:#c33;">회원 탈퇴</h2>
            <p style="color:#888; font-size:13px; margin-bottom:12px;">
                탈퇴하면 계정 정보가 삭제됩니다. 작성하신 게시물·댓글은 함께 삭제됩니다. 이 작업은 되돌릴 수 없습니다.
            </p>

            <div class="alert alert-danger" th:if="${withdrawError}" th:text="${withdrawError}"></div>

            <button class="btn btn-danger" type="button"
                    onclick="document.getElementById('withdraw-form').classList.toggle('open')">[탈퇴 진행]</button>

            <div id="withdraw-form" class="reply-form-box" style="margin-top:12px;">
                <form th:action="@{/settings/withdraw}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="form-group">
                        <label>비밀번호 확인</label>
                        <input type="password" name="password" placeholder="비밀번호를 입력하여 탈퇴를 확인하세요" required>
                    </div>
                    <button class="btn btn-danger" type="submit"
                            onclick="return confirm('정말로 탈퇴하시겠습니까? 이 작업은 되돌릴 수 없습니다.')">[탈퇴 확인]</button>
                    <button class="btn" type="button"
                            onclick="document.getElementById('withdraw-form').classList.remove('open')">취소</button>
                </form>
            </div>
        </div>

    </div>
</main>
</body>
</html>
